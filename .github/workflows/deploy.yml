# .github/workflows/deploy.yml
name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣  Check out your repository
      - uses: actions/checkout@v4

      # 2️⃣  (optional) Quick secret scan with Gitleaks
      - name: Scan for secrets
        uses: zricethezav/gitleaks-action@v2
        continue-on-error: true

      # 3️⃣  Install Railway CLI
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # 4️⃣  Build & deploy to Railway
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}   # ← make sure this secret exists
        run: |
          echo "🔑 RAILWAY_TOKEN length = ${#RAILWAY_TOKEN}"
          railway up --detach
